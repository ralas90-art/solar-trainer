
<!DOCTYPE html>
<html>
<head>
    <style>
    body {
        width: 720pt;
        height: 405pt;
        margin: 0;
        padding: 0;
        background-image: url('../background.png');
        background-size: cover;
        font-family: Arial, sans-serif;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .slide-container {
        flex: 1;
        padding: 40pt;
        display: flex;
        flex-direction: column;
    }
    h1 {
        font-size: 32pt;
        color: #00d2ff;
        margin: 0 0 10pt 0;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    h2 {
        font-size: 18pt;
        color: #b0b0b0;
        margin: 0 0 15pt 0;
        font-weight: normal;
    }
    p, li {
        font-size: 16pt;
        line-height: 1.3;
        color: #e0e0e0;
        margin-bottom: 8pt;
    }
    ul, ol {
        margin-top: 0;
        padding-left: 30pt;
    }
    li {
        margin-bottom: 10pt;
    }
    .box {
        background: rgba(255, 255, 255, 0.05);
        border-left: 5pt solid #f72585; /* Pink accent */
        padding: 15pt;
        margin-top: 15pt;
        border-radius: 0 4pt 4pt 0;
    }
    .highlight-box {
        background: rgba(67, 97, 238, 0.2);
        padding: 20pt;
        border-radius: 8pt;
        margin-top: 20pt;
        border: 1px solid rgba(76, 201, 240, 0.3);
    }
    strong {
        color: #ffffff;
    }
</style>
</head>
<body>
    <div class="slide-container">
        <h1>Why Solar First</h1>
        
        <div class="content">
            
            <p>Solar is the ideal wedge market:</p>
            <ul>
                <li>High-ticket transactions</li>
                <li>Complex financing and objections</li>
                <li>State-by-state regulation</li>
                <li>Massive rep churn</li>
                <li>Poor industry-wide training standards</li>
            </ul>
            <div class="highlight-box">
                <p style="text-align: center;">If Antigravity works in solar, it works anywhere.</p>
            </div>
        
        </div>
        <div style="position: absolute; bottom: 20pt; right: 20pt; width: 30pt; height: 20pt;">
            <p style="font-size: 10pt; color: #555; text-align: right; margin: 0;">5</p>
        </div>
    </div>
</body>
</html>
