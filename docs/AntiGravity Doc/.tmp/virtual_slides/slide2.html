<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 20pt;
            background: #FFFFFF;
            font-family: Arial, sans-serif;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            width: 100%;
            border-bottom: 3px solid #2980B9;
            padding-bottom: 10pt;
            margin-bottom: 10pt;
        }

        h1 {
            font-size: 32pt;
            margin: 0;
            color: #2980B9;
        }

        .checklist {
            font-size: 20pt;
            margin-top: 10pt;
            line-height: 1.5;
        }

        .check {
            color: #27AE60;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="header-box">
        <h1>Just to Confirm...</h1>
    </div>
    <div class="checklist">
        <div>
            <p><span class="check">✓</span>&nbsp; Address: [123 Main St]</p>
        </div>
        <div>
            <p><span class="check">✓</span>&nbsp; Usage: [12,000 kWh/yr]</p>
        </div>
        <div>
            <p><span class="check">✓</span>&nbsp; Goal: Save Money</p>
        </div>
    </div>
</body>

</html>
