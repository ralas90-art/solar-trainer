<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 40pt;
            background: #FFFFFF;
            font-family: Arial, sans-serif;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 36pt;
            margin-bottom: 40pt;
            color: #C0392B;
        }

        .graph {
            width: 80%;
            height: 200pt;
            border-left: 5px solid #333;
            border-bottom: 5px solid #333;
            position: relative;
        }

        .line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-top: 5px dashed #C0392B;
            transform: rotate(-20deg);
            transform-origin: bottom left;
        }

        * {
            box-sizing: border-box;
        }

    </style>
</head>

<body>
    <h1>The Utility Trap</h1>
    <div class="graph">
        <div style="position: absolute; bottom: 10pt; left: 10pt;">
            <p>Now</p>
        </div>
        <div style="position: absolute; bottom: 10pt; right: 10pt;">
            <p>10 Years</p>
        </div>
        <div
            style="position: absolute; top: 50%; left: 50%; width: 100%; text-align: center; transform: translate(-50%, -50%) rotate(-20deg);">
            <p style="font-size: 20pt; color: #C0392B; margin: 0;">RISING RATES</p>
        </div>
    </div>
</body>

</html>
