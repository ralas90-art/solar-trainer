<!DOCTYPE html>
<html>

<head>
    <style>
    * { box-sizing: border-box; }
        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 0;
            background: #FFFFFF;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: row;
        }

        .split {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .bad {
            background: #333;
            color: white;
        }

        .good {
            background: #F39C12;
            color: white;
        }

        h2 {
            font-size: 30pt;
        }
    </style>
</head>

<body>
    <div class="split bad">
        <h2>Problem</h2>
        <p>Unpredictable Bills</p>
    </div>
    <div class="split good">
        <h2>Solution</h2>
        <p>Solar Stability</p>
    </div>
</body>

</html>
