<!DOCTYPE html>
<html>

<head>
    <style>
    * { box-sizing: border-box; }
        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 0;
            background: #2C3E50;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: row;
        }

        .left {
            width: 40%;
            background: #34495E;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .right {
            width: 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40pt;
        }

        h1 {
            font-size: 32pt;
            margin: 0;
            color: #ECF0F1;
        }

        .agent-photo {
            width: 150pt;
            height: 150pt;
            background: #95A5A6;
            border-radius: 50%;
            margin-bottom: 20pt;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2C3E50;
        }
    </style>
</head>

<body>
    <div class="left">
        <div class="agent-photo">
            <p>[PHOTO]</p>
        </div>
        <h3>[Agent Name]</h3>
    </div>
    <div class="right">
        <h1>Your Path to Energy Independence</h1>
        <p style="font-size: 16pt; color: #BDC3C7;">Prepared for the [Name] Family</p>
    </div>
</body>

</html>
