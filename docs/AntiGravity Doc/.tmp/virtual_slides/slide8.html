<!DOCTYPE html>
<html>

<head>
    <style>
    * { box-sizing: border-box; }
        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 0;
            background: #27AE60;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 40pt;
        }

        .circle {
            width: 100pt;
            height: 100pt;
            border: 5pt solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50pt;
            margin-bottom: 20pt;
        }
    </style>
</head>

<body>
    <div class="circle">
        <p>✓</p>
    </div>
    <h1>Getting Qualified</h1>
    <p style="font-size: 20pt;">Let's get you that Green Light</p>
</body>

</html>
