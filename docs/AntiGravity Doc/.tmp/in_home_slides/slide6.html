<!DOCTYPE html>
<html>

<head>
    <style>
    * { box-sizing: border-box; }
        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 20pt;
            background: #FFFFFF;
            font-family: Arial, sans-serif;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            width: 100%;
            border-bottom: 3px solid #9B59B6;
            padding-bottom: 10pt;
            margin-bottom: 10pt;
        }

        h1 {
            font-size: 32pt;
            margin: 0;
            color: #8E44AD;
        }

        .content {
            margin-top: 10pt;
            display: flex;
            justify-content: space-around;
        }

        .box {
            width: 45%;
            border-radius: 10pt;
            padding: 20pt;
            text-align: center;
        }

        .old {
            background: #FDEDEC;
            border: 2px solid #E74C3C;
        }

        .new {
            background: #EAFAF1;
            border: 2px solid #27AE60;
        }

        .price {
            font-size: 40pt;
            font-weight: bold;
            margin: 10pt 0;
        }

        .label {
            font-size: 16pt;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <div class="header-box">
        <h1>The Bill Swap</h1>
    </div>
    <div class="content">
        <div class="box old">
            <div class="label" style="color: #C0392B;">
                <p>Utility (Old Way)</p>
            </div>
            <div class="price" style="color: #C0392B;">
                <p>$250</p>
            </div>
            <p>Rising Forever</p>
        </div>
        <div class="box new">
            <div class="label" style="color: #27AE60;">
                <p>Solar (New Way)</p>
            </div>
            <div class="price" style="color: #27AE60;">
                <p>$180</p>
            </div>
            <p>Fixed Rate</p>
        </div>
    </div>
</body>

</html>
