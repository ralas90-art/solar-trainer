<!DOCTYPE html>
<html>

<head>
    <style>
    * { box-sizing: border-box; }
        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 20pt;
            background: #FFFFFF;
            font-family: Arial, sans-serif;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            width: 100%;
            border-bottom: 3px solid #16A085;
            padding-bottom: 10pt;
            margin-bottom: 10pt;
        }

        h1 {
            font-size: 32pt;
            margin: 0;
            color: #16A085;
        }

        ul {
            font-size: 24pt;
            margin-top: 30pt;
            line-height: 1.8;
        }

        .badge {
            background: #F1C40F;
            color: black;
            padding: 5pt 10pt;
            border-radius: 5pt;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="header-box">
        <h1>Why Now?</h1>
    </div>
    <ul>
        <li><span class="badge">30%</span> Federal Tax Credit.</li>
        <li>Increase Home Value (Avg 4.1%).</li>
        <li>Protect against Inflation.</li>
    </ul>
</body>

</html>
