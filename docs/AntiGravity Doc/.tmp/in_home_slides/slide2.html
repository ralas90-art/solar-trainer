<!DOCTYPE html>
<html>

<head>
    <style>
    * { box-sizing: border-box; }
        * {
            box-sizing: border-box;
        }

        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 20pt;
            background: #FFFFFF;
            font-family: Arial, sans-serif;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            width: 100%;
            border-bottom: 3px solid #E74C3C;
            padding-bottom: 10pt;
            margin-bottom: 10pt;
        }

        h1 {
            font-size: 28pt;
            margin: 0;
            color: #C0392B;
        }

        ul {
            font-size: 18pt;
            margin-top: 5pt;
            line-height: 1.2;
        }

        .container {
            display: flex;
            flex-direction: row;
        }

        .text-col {
            width: 60%;
        }

        .visual-col {
            width: 40%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: #ECF0F1;
            padding: 20pt;
            border-radius: 10pt;
            text-align: center;
            font-weight: bold;
            color: #7F8C8D;
        }
    </style>
</head>

<body>
    <div class="header-box">
        <h1>Why Rent Your Power?</h1>
    </div>
    <div class="container">
        <div class="text-col">
            <ul>
                <li>You pay the Utility Company forever.</li>
                <li>Rates have increased by <b>40%</b> in the last 10 years.</li>
                <li><b>$0 Return on Investment</b> (It's just an expense).</li>
            </ul>
        </div>
        <div class="visual-col">
            <div class="box">
                <p style="font-size: 60pt; margin: 0; color: #C0392B;">-100%</p>
                <p>ROI</p>
            </div>
        </div>
    </div>
</body>

</html>
