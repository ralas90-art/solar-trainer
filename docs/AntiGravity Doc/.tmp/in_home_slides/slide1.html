<!DOCTYPE html>
<html>

<head>
    <style>
    * { box-sizing: border-box; }
        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 0;
            background: #1C2833;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 40pt;
            margin: 0;
            color: #F1C40F;
        }

        h2 {
            font-size: 24pt;
            margin-top: 20pt;
            color: #BDC3C7;
        }

        .logo-area {
            position: absolute;
            top: 20pt;
            right: 20pt;
            font-size: 14pt;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="logo-area">
        <p>[LOGO]</p>
    </div>
    <h1>Energy Independence</h1>
    <h2>For the [Homeowner Last Name] Family</h2>
    <div style="margin-top: 40pt;">
        <p style="font-size: 14pt; color: #888;">Prepared by: [Agent Name]</p>
    </div>
</body>

</html>
