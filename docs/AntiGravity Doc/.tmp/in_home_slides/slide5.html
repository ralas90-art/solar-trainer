<!DOCTYPE html>
<html>

<head>
    <style>
    * { box-sizing: border-box; }
        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 20pt;
            background: #FFFFFF;
            font-family: Arial, sans-serif;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            width: 100%;
            border-bottom: 3px solid #3498DB;
            padding-bottom: 10pt;
            margin-bottom: 10pt;
        }

        h1 {
            font-size: 32pt;
            margin: 0;
            color: #3498DB;
        }

        .content {
            margin-top: 10pt;
            display: flex;
            flex-direction: row;
        }

        .left {
            width: 50%;
            padding-right: 20pt;
        }

        .right {
            width: 50%;
            background: #EEE;
            border: 2px dashed #AAA;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 250pt;
        }

        ul {
            font-size: 20pt;
            line-height: 2;
        }
    </style>
</head>

<body>
    <div class="header-box">
        <h1>Custom Design</h1>
    </div>
    <div class="content">
        <div class="left">
            <ul>
                <li><b>XX</b> Premium Panels</li>
                <li><b>100%</b> Energy Offset</li>
                <li><b>25-Year</b> Guarantee</li>
            </ul>
        </div>
        <div class="right">
            <p style="color: #999;">[Place CAD Design Image Here]</p>
        </div>
    </div>
</body>

</html>
