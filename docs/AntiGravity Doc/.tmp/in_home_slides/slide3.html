<!DOCTYPE html>
<html>

<head>
    <style>
    * { box-sizing: border-box; }
        body {
            width: 720pt;
            height: 405pt;
            margin: 0;
            padding: 20pt;
            background: #FFFFFF;
            font-family: Arial, sans-serif;
            color: #2C3E50;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            width: 100%;
            border-bottom: 3px solid #27AE60;
            padding-bottom: 10pt;
            margin-bottom: 10pt;
        }

        h1 {
            font-size: 32pt;
            margin: 0;
            color: #27AE60;
        }

        ul {
            font-size: 20pt;
            margin-top: 10pt;
            line-height: 1.5;
        }

        .container {
            display: flex;
            flex-direction: row;
        }

        .text-col {
            width: 60%;
        }

        .visual-col {
            width: 40%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: #E8F8F5;
            padding: 20pt;
            border-radius: 10pt;
            text-align: center;
            font-weight: bold;
            color: #27AE60;
            border: 2px solid #27AE60;
        }
    </style>
</head>

<body>
    <div class="header-box">
        <h1>Stop Renting. Start Owning.</h1>
    </div>
    <div class="container">
        <div class="text-col">
            <ul>
                <li>Lock in a <b>fixed</b> rate.</li>
                <li>Build equity in your home.</li>
                <li>There is an <b>End Date</b> to your payments.</li>
            </ul>
        </div>
        <div class="visual-col">
            <div class="box">
                <p style="font-size: 40pt; margin: 0;">OWNERSHIP</p>
                <p>Asset vs Liability</p>
            </div>
        </div>
    </div>
</body>

</html>
