
<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; }
html { background: #faf9f5; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #faf9f5; font-family: Georgia, serif;
  display: flex; color: #141413; flex-direction: column;
}
.slide-container {
    width: 100%; height: 100%; display: flex; flex-direction: column;
}
.title-bar {
    background: #d97757; color: #faf9f5; padding: 20pt 40pt;
}
.title-bar-blue {
    background: #6a9bcc; color: #faf9f5; padding: 20pt 40pt;
}
.title-bar-green {
    background: #788c5d; color: #faf9f5; padding: 20pt 40pt;
}
h1 { font-family: Arial, sans-serif; font-size: 32pt; margin: 0; color: inherit; }
h2 { font-family: Arial, sans-serif; font-size: 24pt; margin: 0 0 10pt 0; color: #6a9bcc; }
h3 { font-family: Arial, sans-serif; font-size: 20pt; color: #788c5d; margin: 0 0 10pt 0; }
.content-area {
    padding: 30pt 40pt; flex: 1; display: flex; flex-direction: column; justify-content: flex-start;
}
p { font-size: 18pt; line-height: 1.4; margin: 10pt 0; }
ul, ol { font-size: 18pt; line-height: 1.4; margin: 10pt 0 10pt 20pt; }
li { margin-bottom: 8pt; }
.two-col {
    display: flex; flex-direction: row; gap: 40pt; flex: 1;
}
.col { flex: 1; display: flex; flex-direction: column; }
.box-highlight {
    background: #e8e6dc; padding: 20pt; border-left: 8pt solid #d97757; border-radius: 8pt; margin-top: 15pt;
}
.box-blue {
    background: #e8e6dc; padding: 20pt; border-left: 8pt solid #6a9bcc; border-radius: 8pt; margin-top: 15pt;
}
.box-green {
    background: #e8e6dc; padding: 20pt; border-left: 8pt solid #788c5d; border-radius: 8pt; margin-top: 15pt;
}
.image-placeholder {
    background: #b0aea5; border-radius: 12pt; display: flex; align-items: center; justify-content: center;
    color: #141413; font-family: Arial, sans-serif; height: 180pt; flex: 1; margin-top: 20pt;
}
.title-slide {
    background: #141413; color: #faf9f5; align-items: center; justify-content: center; text-align: center;
    width: 100%; height: 100%; display: flex; flex-direction: column; padding: 40pt;
}
.title-slide h1 { color: #d97757; font-size: 40pt; margin-bottom: 20pt; }
.title-slide h2 { color: #e8e6dc; font-size: 28pt; }
.bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 10pt; background: #788c5d;
}
.center { text-align: center; align-items: center; }
.large-text { font-size: 24pt; line-height: 1.5; }
.xl-text { font-size: 32pt; line-height: 1.5; color: #d97757; font-weight: bold; }
</style>
</head>
<body>

        <div class="title-bar">
            <h1>The Status Quo Bias</h1>
        </div>
        <div class="content-area two-col">
            <div class="col">
                <h2>The Bias</h2>
                <p>Preference for the current state.</p>
                <h2 style="margin-top:20pt; color:#d97757">The Perception</h2>
                <p>Change = Risk.</p>
                <h2 style="margin-top:20pt; color:#788c5d">The Reality</h2>
                <p>Doing nothing feels free, but it's actually the most expensive option.</p>
            </div>
            <div class="col">
                <div class="image-placeholder">
                    <p>[Diagram: Status Quo island vs Solar treasure island]</p>
                </div>
            </div>
        </div>
        <div class="bottom-bar"></div>
    
</body>
</html>
